<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面 | ハッピーファミリー株式会社</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--blue:#1a3a6b;--blue-lt:#e8eef8;--green:#1e7e4a;--red:#c0392b;--gray:#6c757d;--gray-lt:#f4f6f8;--white:#fff;--shadow:0 2px 10px rgba(0,0,0,.09);--font:'Noto Sans JP','Meiryo',sans-serif;--radius:8px;}
html{font-size:15px;}
body{font-family:var(--font);background:#eef1f6;color:#333;min-height:100vh;}
.admin-header{background:linear-gradient(135deg,var(--blue) 0%,#2d5fa8 100%);color:#fff;padding:14px 20px;position:sticky;top:0;z-index:100;box-shadow:0 3px 10px rgba(0,0,0,.2);display:flex;align-items:center;gap:14px;}
.admin-header h1{font-size:17px;flex:1;}
.admin-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;}
.btn-header{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);color:#fff;font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:background .2s;display:flex;align-items:center;gap:6px;text-decoration:none;}
.btn-header:hover{background:rgba(255,255,255,.3);}
.admin-container{max-width:1100px;margin:0 auto;padding:20px 14px 40px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;display:flex;align-items:center;gap:14px;}
.stat-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.stat-icon.blue{background:var(--blue-lt);color:var(--blue);}
.stat-icon.green{background:#eaf6ee;color:var(--green);}
.stat-icon.orange{background:#fff3e0;color:#e65100;}
.stat-icon.red{background:#fdecea;color:var(--red);}
.stat-num{font-size:22px;font-weight:700;line-height:1;}
.stat-label{font-size:11px;color:var(--gray);margin-top:3px;}
.toolbar{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 16px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.search-box{flex:1;min-width:200px;display:flex;align-items:center;gap:6px;border:1.5px solid #c8d0dc;border-radius:6px;padding:7px 10px;background:#fff;}
.search-box input{border:none;outline:none;font-size:13px;font-family:var(--font);flex:1;color:#333;}
.search-box i{color:var(--gray);}
.filter-select{border:1.5px solid #c8d0dc;border-radius:6px;padding:7px 10px;font-size:13px;font-family:var(--font);color:#333;background:#fff;outline:none;cursor:pointer;}
.btn-tool{border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s;}
.btn-csv{background:var(--green);color:#fff;}
.btn-csv:hover{background:#175f38;}
.btn-excel{background:var(--blue);color:#fff;}
.btn-excel:hover{background:#12296b;}
.btn-reload{background:#f0f4ff;color:var(--blue);border:1.5px solid var(--blue);}
.btn-reload:hover{background:var(--blue-lt);}
.btn-print{background:#c62828;color:#fff;}
.btn-print:hover{background:#a31f1f;}
.record-count{font-size:12px;color:var(--gray);margin-left:auto;}
.table-wrap{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.table-scroll{overflow-x:auto;}
.data-table{width:100%;border-collapse:collapse;min-width:900px;font-size:12.5px;}
.data-table thead{background:var(--blue);color:#fff;}
.data-table th{padding:10px 12px;text-align:left;font-size:11.5px;font-weight:700;white-space:nowrap;}
.data-table th i{margin-right:4px;opacity:.85;}
.data-table td{padding:10px 12px;border-bottom:1px solid #eef0f4;vertical-align:middle;}
.data-table tbody tr:hover{background:#f8faff;}
.data-table tbody tr:last-child td{border-bottom:none;}
.cell-name{font-weight:600;color:#222;}
.cell-date{color:var(--gray);font-size:11.5px;}
.cell-amount{font-weight:600;color:var(--blue);}
.status-badge{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 10px;border-radius:20px;white-space:nowrap;}
.status-未処理{background:#fff3cd;color:#856404;}
.status-処理済{background:#d1f0e0;color:#155724;}
.status-キャンセル{background:#fdecea;color:var(--red);}
.type-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
.btn-action{border:none;border-radius:5px;padding:5px 10px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s;display:inline-flex;align-items:center;gap:4px;margin:1px;}
.btn-view{background:var(--blue-lt);color:var(--blue);}
.btn-view:hover{background:#c8d8f2;}
.btn-delete{background:#fdecea;color:var(--red);}
.btn-delete:hover{background:#f8bdb7;}
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;}
.page-btn{border:1.5px solid #c8d0dc;background:var(--white);border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:var(--font);transition:all .15s;color:#333;}
.page-btn:hover{background:var(--blue-lt);border-color:var(--blue);color:var(--blue);}
.page-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700;}
.page-btn:disabled{opacity:.45;cursor:not-allowed;}
.page-info{font-size:12px;color:var(--gray);margin:0 8px;}
.empty-state{text-align:center;padding:48px 24px;color:var(--gray);}
.empty-state i{font-size:40px;margin-bottom:12px;display:block;opacity:.5;}
.empty-state p{font-size:14px;}
.login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#1a3a6b,#2d5fa8);z-index:9999;display:flex;align-items:center;justify-content:center;}
.login-card{background:#fff;border-radius:16px;padding:36px 32px;max-width:360px;width:90%;box-shadow:0 12px 40px rgba(0,0,0,.3);text-align:center;}
.login-logo{font-size:40px;margin-bottom:12px;}
.login-title{font-size:18px;font-weight:700;color:var(--blue);margin-bottom:6px;}
.login-sub{font-size:12px;color:var(--gray);margin-bottom:24px;}
.login-input{width:100%;padding:12px 14px;border:1.5px solid #ccc;border-radius:8px;font-size:15px;font-family:var(--font);margin-bottom:14px;outline:none;}
.login-input:focus{border-color:var(--blue);}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--blue),#2d5fa8);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);}
.login-error{color:var(--red);font-size:12px;margin-top:8px;display:none;}
.login-error.show{display:block;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--white);border-radius:14px;max-width:640px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.22);margin:auto;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{background:var(--blue);color:#fff;padding:14px 20px;border-radius:14px 14px 0 0;display:flex;align-items:center;justify-content:space-between;}
.modal-header h2{font-size:15px;}
.modal-close{background:none;border:none;color:rgba(255,255,255,.8);font-size:20px;cursor:pointer;line-height:1;}
.modal-close:hover{color:#fff;}
.modal-body{padding:20px;max-height:70vh;overflow-y:auto;}
.detail-section{margin-bottom:16px;}
.detail-section-title{font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #eee;padding-bottom:6px;margin-bottom:10px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.detail-item label{font-size:10.5px;color:var(--gray);display:block;margin-bottom:2px;}
.detail-item span{font-size:13px;color:#222;font-weight:500;}
.detail-item.full{grid-column:1/-1;}
.modal-footer{padding:14px 20px;border-top:1px solid #eef0f4;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;}
.btn-modal-status{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:8px 18px;font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;transition:background .2s;}
.btn-modal-status:hover{background:#254e99;}
.btn-modal-cancel{background:var(--gray-lt);color:#555;border:1px solid #ccc;border-radius:6px;padding:8px 18px;font-size:13px;font-family:var(--font);cursor:pointer;}
.no-data-guide{background:#fff;border-radius:12px;padding:28px 24px;margin-bottom:16px;text-align:center;box-shadow:var(--shadow);display:none;}
.no-data-guide.show{display:block;}
.no-data-guide h3{color:var(--blue);font-size:16px;margin-bottom:10px;}
.no-data-guide p{font-size:13px;color:var(--gray);line-height:1.8;}
@media(max-width:600px){
  .admin-header h1{font-size:14px;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .toolbar{flex-direction:column;}
  .search-box,.filter-select{width:100%;}
  .detail-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="login-logo">🛡️</div>
    <div class="login-title">管理画面ログイン</div>
    <div class="login-sub">ハッピーファミリー株式会社　管理者専用</div>
    <input type="password" class="login-input" id="loginPass" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError">パスワードが違います</div>
  </div>
</div>

<header class="admin-header">
  <i class="fas fa-shield-alt" style="font-size:20px;opacity:.85"></i>
  <h1>会員登録管理画面</h1>
  <span class="admin-badge">管理者専用</span>
  <button class="btn-header" onclick="refreshData()"><i class="fas fa-sync-alt"></i> 更新</button>
  <a href="index.html" class="btn-header"><i class="fas fa-edit"></i> 申込フォームへ</a>
</header>

<div class="admin-container">
  <div class="no-data-guide" id="noDataGuide">
    <h3>📋 まだ申込データがありません</h3>
    <p>申込フォームから申込が完了すると、このページに表示されます。</p>
  </div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon blue"><i class="fas fa-users"></i></div>
      <div><div class="stat-num" id="stat-total">—</div><div class="stat-label">総申込件数</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange"><i class="fas fa-clock"></i></div>
      <div><div class="stat-num" id="stat-pending">—</div><div class="stat-label">未処理</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
      <div><div class="stat-num" id="stat-done">—</div><div class="stat-label">処理済み</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon red"><i class="fas fa-ban"></i></div>
      <div><div class="stat-num" id="stat-cancel">—</div><div class="stat-label">キャンセル</div></div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="search-input" placeholder="氏名・フリガナ・電話番号で検索..." oninput="onSearchInput()">
    </div>
    <select class="filter-select" id="status-filter" onchange="applyFilters()">
      <option value="">すべてのステータス</option>
      <option value="未処理">未処理</option>
      <option value="処理済">処理済み</option>
      <option value="キャンセル">キャンセル</option>
    </select>
    <select class="filter-select" id="type-filter" onchange="applyFilters()">
      <option value="">すべての会員区分</option>
      <option value="エクセレント">エクセレント</option>
      <option value="ハッピー">ハッピー</option>
      <option value="エクセレント・ハッピー">エクセレント・ハッピー</option>
    </select>
    <button class="btn-tool btn-reload" onclick="refreshData()">
      <i class="fas fa-sync-alt"></i> 最新データ取得
    </button>
    <button class="btn-tool btn-csv" onclick="exportCSV()">
      <i class="fas fa-file-csv"></i> CSV出力
    </button>
    <button class="btn-tool btn-excel" onclick="exportExcel()">
      <i class="fas fa-file-excel"></i> Excel出力
    </button>
    <button class="btn-tool btn-print" onclick="exportPrintData()">
      <i class="fas fa-print"></i> 契約書印刷データ出力
    </button>
    <span class="record-count" id="record-count"></span>
  </div>

  <div class="table-wrap">
    <div class="table-scroll">
      <table class="data-table">
        <thead>
          <tr>
            <th><i class="fas fa-hashtag"></i>No.</th>
            <th><i class="fas fa-calendar"></i>申込日</th>
            <th><i class="fas fa-user"></i>氏名（フリガナ）</th>
            <th><i class="fas fa-tag"></i>会員区分</th>
            <th><i class="fas fa-phone"></i>電話番号</th>
            <th><i class="fas fa-map-marker-alt"></i>住所</th>
            <th><i class="fas fa-yen-sign"></i>合計金額</th>
            <th><i class="fas fa-info-circle"></i>ステータス</th>
            <th><i class="fas fa-cog"></i>操作</th>
          </tr>
        </thead>
        <tbody id="data-tbody">
          <tr><td colspan="9" style="text-align:center;padding:32px;color:#6c757d">
            <i class="fas fa-spinner fa-spin"></i> 読み込み中...
          </td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h2><i class="fas fa-user-circle" style="margin-right:8px"></i>申込詳細</h2>
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body-content"></div>
    <div class="modal-footer">
      <button class="btn-modal-status" onclick="updateStatus('処理済')">
        <i class="fas fa-check"></i> 処理済みにする
      </button>
      <button class="btn-modal-status" style="background:#e65100" onclick="updateStatus('キャンセル')">
        <i class="fas fa-ban"></i> キャンセル
      </button>
      <button class="btn-modal-status" style="background:#6c757d" onclick="updateStatus('未処理')">
        <i class="fas fa-redo"></i> 未処理に戻す
      </button>
      <!-- ★個別契約書出力ボタン -->
      <button class="btn-modal-status" style="background:#1b5e20" onclick="exportSinglePrintData()">
        <i class="fas fa-file-excel"></i> 契約書出力
      </button>
      <button class="btn-modal-cancel" onclick="closeDetailModal()">閉じる</button>
    </div>
  </div>
</div>

<!-- 削除確認モーダル -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal-box" style="max-width:360px">
    <div class="modal-header" style="background:#c0392b">
      <h2><i class="fas fa-exclamation-triangle" style="margin-right:8px"></i>削除確認</h2>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <div class="modal-body" style="text-align:center;padding:28px 20px">
      <p style="font-size:14px;margin-bottom:16px">
        このデータを削除しますか？<br>
        <small style="color:#c0392b">この操作は元に戻せません</small>
      </p>
    </div>
    <div class="modal-footer" style="justify-content:center">
      <button class="btn-modal-status" style="background:#c0392b" onclick="executeDelete()">
        <i class="fas fa-trash"></i> 削除する
      </button>
      <button class="btn-modal-cancel" onclick="closeDeleteModal()">キャンセル</button>
    </div>
  </div>
</div>

<script>
'use strict';

const GAS_URL        = 'https://script.google.com/macros/s/AKfycbzgYb_p5lUL2JlQAGitrQq2fRES-y6U8yYnhIkWoyFW75lwjAzrzUsrvvplKtmwB3vP/exec';
const GAS_TOKEN      = 'happyfamily2026secret';
const ADMIN_PASSWORD = 'C2tsj89U';

const PAGE_SIZE = 15;
let allRecords      = [];
let filteredRecords = [];
let currentPage     = 1;
let currentRecord   = null;
let deleteTargetId  = null;
let searchTimer     = null;

function doLogin() {
  const pass = document.getElementById('loginPass').value;
  if (pass === ADMIN_PASSWORD) {
    document.getElementById('loginOverlay').style.display = 'none';
    sessionStorage.setItem('adminLoggedIn', '1');
    loadData();
  } else {
    document.getElementById('loginError').classList.add('show');
    document.getElementById('loginPass').value = '';
  }
}

async function gasGet(params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('token', GAS_TOKEN);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  return res.json();
}

async function gasPost(body = {}) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ ...body, token: GAS_TOKEN })
  });
  return res.json();
}

async function loadData() {
  document.getElementById('data-tbody').innerHTML =
    '<tr><td colspan="9" style="text-align:center;padding:32px;color:#6c757d">' +
    '<i class="fas fa-spinner fa-spin"></i> 読み込み中...</td></tr>';
  try {
    const json = await gasGet();
    if (!json.success) throw new Error(json.error || '取得失敗');
    allRecords = json.data || [];
    if (allRecords.length === 0) document.getElementById('noDataGuide').classList.add('show');
    else document.getElementById('noDataGuide').classList.remove('show');
    updateStats();
    applyFilters();
    showToast(`${allRecords.length}件のデータを取得しました`, 'success');
  } catch(err) {
    document.getElementById('data-tbody').innerHTML =
      `<tr><td colspan="9" style="text-align:center;padding:32px;color:#c0392b">` +
      `<i class="fas fa-exclamation-circle"></i> 読み込みに失敗しました：${err.message}</td></tr>`;
    showToast('データ取得に失敗しました', 'error');
  }
}

function refreshData() { loadData(); }

function updateStats() {
  document.getElementById('stat-total').textContent  = allRecords.length;
  document.getElementById('stat-pending').textContent = allRecords.filter(r=>r.status==='未処理').length;
  document.getElementById('stat-done').textContent    = allRecords.filter(r=>r.status==='処理済').length;
  document.getElementById('stat-cancel').textContent  = allRecords.filter(r=>r.status==='キャンセル').length;
}

function onSearchInput() { clearTimeout(searchTimer); searchTimer = setTimeout(applyFilters, 300); }
function applyFilters() {
  const q      = document.getElementById('search-input').value.trim().toLowerCase();
  const status = document.getElementById('status-filter').value;
  const mtype  = document.getElementById('type-filter').value;
  filteredRecords = allRecords.filter(r => {
    if (status && r.status !== status) return false;
    if (mtype  && !(r.member_type||'').includes(mtype)) return false;
    if (q) {
      const hay = [r.name, r.name_kana, r.phone, r.mobile, r.address].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  document.getElementById('record-count').textContent = `${filteredRecords.length} 件`;
  currentPage = 1;
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('data-tbody');
  if (filteredRecords.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state">` +
      `<i class="fas fa-inbox"></i><p>データがありません</p></div></td></tr>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  const start    = (currentPage - 1) * PAGE_SIZE;
  const pageData = filteredRecords.slice(start, start + PAGE_SIZE);
  tbody.innerHTML = pageData.map((r, i) => {
    const no    = start + i + 1;
    const total = Number(r.total) || 0;
    const addr  = (r.address||'').substring(0, 20) + ((r.address||'').length > 20 ? '...' : '');
    const typeColor = (r.member_type||'').includes('エクセレント') && (r.member_type||'').includes('ハッピー')
      ? 'background:#e8eaf6;color:#3949ab'
      : (r.member_type||'').includes('エクセレント')
        ? 'background:#fdecea;color:#c0392b'
        : 'background:#eaf6ee;color:#1e7e4a';
    return `<tr>
      <td class="cell-date">${no}</td>
      <td class="cell-date">${escHtml(r.contract_date||'—')}</td>
      <td>
        <div class="cell-name">${escHtml(r.name||'—')}</div>
        <div style="font-size:11px;color:#888">${escHtml(r.name_kana||'')}</div>

function renderPagination() {
  const total = Math.ceil(filteredRecords.length / PAGE_SIZE);
  if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>
    <i class="fas fa-chevron-left"></i></button>`;
  for (let p = Math.max(1, currentPage-2); p <= Math.min(total, currentPage+2); p++) {
    html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>
    <i class="fas fa-chevron-right"></i></button>`;
  html += `<span class="page-info">${currentPage} / ${total} ページ</span>`;
  document.getElementById('pagination').innerHTML = html;
}
function goPage(p) {
  const total = Math.ceil(filteredRecords.length / PAGE_SIZE);
  if (p < 1 || p > total) return;
  currentPage = p; renderTable();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function updateStatus(newStatus) {
  if (!currentRecord) return;
  try {
    const res = await gasPost({ action:'updateStatus', row_index:currentRecord.row_index, status:newStatus });
    if (!res.success) throw new Error(res.error);
    currentRecord.status = newStatus;
    const idx = allRecords.findIndex(r => r.id === currentRecord.id);
    if (idx >= 0) allRecords[idx].status = newStatus;
    updateStats(); applyFilters(); closeDetailModal();
    showToast(`ステータスを「${newStatus}」に更新しました`, 'success');
  } catch(err) { showToast('更新に失敗しました：'+err.message, 'error'); }
}

function confirmDelete(idx) {

async function executeDelete() {
  if (!deleteTargetId) return;
  try {
    const res = await gasPost({ action:'delete', row_index:deleteTargetId.row_index });
    if (!res.success) throw new Error(res.error);
    allRecords = allRecords.filter(r => r.id !== deleteTargetId.id);
    closeDeleteModal();
    if (allRecords.length === 0) document.getElementById('noDataGuide').classList.add('show');
    updateStats(); applyFilters();
    showToast('データを削除しました', 'success');
  } catch(err) {
    showToast('削除に失敗しました：'+err.message, 'error');
    closeDeleteModal();
  }
}

// ============================================================
//  印刷データ変換（GAS不要・ブラウザ内で完結）
// ============================================================
function convertToPrintRecord(r) {
  // 和暦→YYYYMMDD
  function toYMD(str) {
    if (!str) return '';
    const m = str.match(/^(明治|大正|昭和|平成|令和)(\d+)年(\d+)月(\d+)日$/);
    if (!m) return str;
    const era = {'明治':1867,'大正':1911,'昭和':1925,'平成':1988,'令和':2018};
    return `${era[m[1]]+parseInt(m[2])}${String(m[3]).padStart(2,'0')}${String(m[4]).padStart(2,'0')}`;
  }
  // 住所分割
  function splitAddr(full) {
    if (!full) return {a1:'', a2:''};
    const m = full.match(/^(.*?(?:市|区|町|村))(.*)/);
    return m ? {a1:m[1], a2:m[2].trim()} : {a1:full, a2:''};
  }
  // 商品セル解析 "商品名　11,000円"
  function parseProduct(s) {
    if (!s) return {name:'', price:''};
    const m = s.match(/^(.+?)[\s　]+([0-9,]+)円$/);
    return m ? {name:m[1].trim(), price:m[2]} : {name:s, price:''};
  }
  // ハッピー商品解析
  function parseHappy(s) {
    if (!s) return {name:'', price:'', total:0};
    if (s.includes('SOLUNA') || s.includes('水素ガス')) {
      return {name:'水素ガス吸入器SOLUNA', price:'374,000', total:374000};
    }
    return {name:'', price:'', total:0};
  }

  const addr    = splitAddr(r.address || '');
  const delFull = r.delivery_addr || '';
  const hasDel  = delFull.trim() !== '';
  const del     = splitAddr(delFull);
  const ex1     = parseProduct(r.br001 || '');
  const ex2     = parseProduct(r.br102 || '');
  const ex3     = parseProduct(r.br103 || '');
  const hp      = parseHappy(r.happy_detail || '');
  const zip1    = (r.address_zip  || '').replace(/[^0-9]/g,'');
  const zip2    = (r.delivery_zip || '').replace(/[^0-9]/g,'');

  return {
    '会員番号':             '',
    '契約日':               toYMD(r.contract_date || ''),
    '氏名':                 r.name        || '',
    'フリガナ':             r.name_kana   || '',
    '生年月日':             toYMD(r.birth || ''),
    '性別':                 (r.gender||'').replace('性',''),
    '会員区分':             (r.member_type||'').includes('エクセレント') ? 'エクセレント' : 'ハッピー',
    '契約種別':             (r.reg_type||'').replace('登録',''),
    '書類お届け先':         r.doc_delivery || '',
    '契約住所（郵便番号）': zip1,
    '住所1':                addr.a1,
    '住所2':                addr.a2,
    '電話番号':             r.phone  || '',
    '携帯番号':             r.mobile || '',
    'FAX番号':              r.fax    || '',
    // ★お届け先：空欄なら全て空欄
    '発送住所（郵便番号）': hasDel ? zip2              : '',
    '住所1.1':              hasDel ? del.a1            : '',
    '住所2.1':              hasDel ? del.a2            : '',
    '電話番号.1':           hasDel ? (r.delivery_tel||'') : '',
    '携帯番号.1':           '',
    'FAX番号.1':            '',
    'エクセレント商品1':    ex1.name,
    'エクセレント金額1':    ex1.price,
    'エクセレント商品2':    ex2.name,
    'エクセレント金額2':    ex2.price,
    'エクセレント商品3':    ex3.name,
    'エクセレント金額3':    ex3.price,
    'エクセレント合計金額': r.exc_total || 0,
    '水素ガス吸入器':       hp.name,
    '水素金額':             hp.price,
    '水素合計金額':         hp.total,
  };
}

function showToast(msg, type='info') {
  const ex = document.getElementById('admin-toast');
  if (ex) ex.remove();
  const t = document.createElement('div');
  t.id = 'admin-toast';
  const colors = {success:'#27ae60', error:'#c0392b', info:'#1a3a6b'};
  Object.assign(t.style, {
    position:'fixed', bottom:'24px', left:'50%', transform:'translateX(-50%)',
    background:colors[type], color:'#fff', padding:'11px 22px',
    borderRadius:'8px', fontSize:'13px', fontWeight:'700',
    boxShadow:'0 4px 16px rgba(0,0,0,.2)', zIndex:'9999',
    opacity:'0', transition:'opacity .3s', maxWidth:'90vw'
  });
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>{ t.style.opacity='1'; });
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),350); }, 3000);
}

  el.addEventListener('click', e => {

      el.classList.remove('open');
      if (el.id==='detail-modal') currentRecord = null;
      if (el.id==='delete-modal') deleteTargetId = null;
    }
  });
});

window.onload = () => {
  if (sessionStorage.getItem('adminLoggedIn') === '1') {
    document.getElementById('loginOverlay').style.display = 'none';
    loadData();
  }
};
</script>
</body>
</html>
